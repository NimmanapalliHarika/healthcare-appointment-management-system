services:
  mysql:
    image: mysql:8.4
    container_name: mysql-doctor
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - healthcare-network

  redis:
    image: redis:latest
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    networks:
      - healthcare-network

  eureka-server:
    image: eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    networks:
      - healthcare-network

  doctor-service:
    image: doctor-service
    container_name: doctor-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - redis
      - eureka-server
    networks:
      - healthcare-network

  patient-service:
    image: patient-service
    container_name: patient-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
      - eureka-server
    networks:
      - healthcare-network

  appointment-service:
    image: appointment-service
    container_name: appointment-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - redis
      - eureka-server
    networks:
      - healthcare-network

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - doctor-service
      - patient-service
      - appointment-service
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge

volumes:
  mysql-data:
